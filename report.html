<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Item</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>Report Lost or Found Item</h2>
</header>

<div class="container">

<form id="reportForm">

<label for="type">Item Type</label>
<select id="type" name="type">
<option value="lost">Lost Item</option>
<option value="found">Found Item</option>
</select>

<label for="itemName">Item Name</label>
<input type="text" id="itemName" name="itemName" placeholder="Enter item name" required>

<label for="category">Category</label>
<select id="category" name="category">
<option value="electronics">Electronics</option>
<option value="books">Books</option>
<option value="idcard">ID Card</option>
<option value="accessories">Accessories</option>
</select>

<label for="location">Location</label>
<select id="location" name="location">
<option value="library">Library</option>
<option value="cafeteria">Cafeteria</option>
<option value="lecturehall">Lecture Hall</option>
<option value="busstop">Bus Stop</option>
</select>

<label for="description">Description</label>
<textarea id="description" name="description" placeholder="Describe the item"></textarea>

<label for="photo">Upload Photo</label>
<input type="file" id="photo" name="photo" accept="image/*">

<button type="submit">Submit</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
