<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h2>Dashboard</h2>
</header>

<div class="container">

<div class="stats">

<div class="stat">
<h3>Reports</h3>
<p>45</p>
</div>

<div class="stat">
<h3>Found</h3>
<p>30</p>
</div>

<div class="stat">
<h3>Returned</h3>
<p>20</p>
</div>

</div>

<canvas id="chart"></canvas>

</div>

<script>

const ctx = document.getElementById('chart');

new Chart(ctx,{
type:'bar',

data:{
labels:['Electronics','Books','ID Cards','Accessories'],

datasets:[{
label:'Items',
data:[12,8,15,10]
}]
}

});

</script>

</body>
</html>
