<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

/* Reset */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

/* Background */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#28a745,#1f7a33);
}

/* Login Card */
.container{
  background: rgba(255,255,255,0.95);
  padding:40px;
  width:350px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
}

/* Title */
.container h2{
  margin-bottom:25px;
  color:#333;
}

/* Labels */
label{
  display:block;
  text-align:left;
  margin-top:12px;
  font-size:14px;
  color:#555;
}

/* Inputs */
input{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:14px;
  transition:0.3s;
}

input:focus{
  border-color:#28a745;
  outline:none;
  box-shadow:0 0 5px rgba(40,167,69,0.4);
}

/* Button */
button{
  width:100%;
  padding:12px;
  margin-top:20px;
  border:none;
  border-radius:6px;
  background:#28a745;
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#218838;
}

/* Message */
#message{
  margin-top:15px;
  font-size:14px;
  color:red;
}

/* Mobile */
@media(max-width:400px){
  .container{
    width:90%;
    padding:30px;
  }
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<form id="loginForm">

<label for="email">Email</label>
<input type="email" id="email" placeholder="Enter your email" required>

<label for="password">Password</label>
<input type="password" id="password" placeholder="Enter your password" required>

<button type="submit">Login</button>

</form>

<p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
