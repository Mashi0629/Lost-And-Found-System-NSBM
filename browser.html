<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Items</title>
</head>

<body style="font-family: Arial, sans-serif; background: #f4f6f9; margin:0; padding:0;">

<header style="background-color:#2c3e50; color:white; padding:20px; text-align:center;">
<h2>Browse Lost & Found</h2>
</header>

<div style="width:90%; max-width:1200px; margin:30px auto;">

<input type="text" id="search" placeholder="Search items..." 
style="width:100%; padding:12px 20px; margin-bottom:20px; border:1px solid #ccc; border-radius:8px; font-size:16px;">

<div id="items" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px;">

<div class="card" style="background:white; padding:20px; border-radius:12px; box-shadow:0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; text-align:center; font-weight:bold; cursor:pointer;"
onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 8px 16px rgba(0,0,0,0.2)';" 
onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 8px rgba(0,0,0,0.1)';">Laptop - Library</div>

<div class="card" style="background:white; padding:20px; border-radius:12px; box-shadow:0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; text-align:center; font-weight:bold; cursor:pointer;"
onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 8px 16px rgba(0,0,0,0.2)';" 
onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 8px rgba(0,0,0,0.1)';">ID Card - Cafeteria</div>

<div class="card" style="background:white; padding:20px; border-radius:12px; box-shadow:0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; text-align:center; font-weight:bold; cursor:pointer;"
onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 8px 16px rgba(0,0,0,0.2)';" 
onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 8px rgba(0,0,0,0.1)';">USB Drive - Lab</div>

<div class="card" style="background:white; padding:20px; border-radius:12px; box-shadow:0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; text-align:center; font-weight:bold; cursor:pointer;"
onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 8px 16px rgba(0,0,0,0.2)';" 
onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 8px rgba(0,0,0,0.1)';">Headphones - Bus Stop</div>

<div class="card" style="background:white; padding:20px; border-radius:12px; box-shadow:0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; text-align:center; font-weight:bold; cursor:pointer;"
onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 8px 16px rgba(0,0,0,0.2)';" 
onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 8px rgba(0,0,0,0.1)';">Calculator - Lecture Hall</div>

<div class="card" style="background:white; padding:20px; border-radius:12px; box-shadow:0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; text-align:center; font-weight:bold; cursor:pointer;"
onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 8px 16px rgba(0,0,0,0.2)';" 
onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 8px rgba(0,0,0,0.1)';">Phone Charger - Library</div>

<!-- Add other cards similarly... -->

</div>
</div>

<script>
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");

search.addEventListener("keyup", function() {
    const filter = search.value.toLowerCase();
    cards.forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(filter) ? "block" : "none";
    });
});
</script>

</body>
</html>
